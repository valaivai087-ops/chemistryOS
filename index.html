<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>化學學習操作系統 Chemistry Learning OS | Anne Wang 編制</title>
<meta name="description" content="雙語化學學習APP：物質能量測量、原子分子離子，含英文發音、易錯點、必考重點、單字卡與小測驗。">
<style>
/* ============================================================
   Chemistry Learning OS — Style System
   白底、海軍藍／金／青三色、大字、行動裝置友善
   ============================================================ */
:root{
  --navy:#15314f;
  --navy-light:#1f4870;
  --gold:#c79a3c;
  --gold-light:#f3e2b3;
  --teal:#1f8a8c;
  --teal-light:#e3f4f3;
  --bg:#ffffff;
  --bg-soft:#f7f8fa;
  --ink:#1c2530;
  --ink-soft:#5b6473;
  --border:#e3e6ea;
  --green:#2f9e58;
  --red:#c4453a;
  --radius:14px;
  --shadow:0 2px 10px rgba(21,49,79,0.08);
  --shadow-lg:0 8px 28px rgba(21,49,79,0.14);
  font-size:18px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
.eng{font-family:"Georgia","Times New Roman",serif;}
h1,h2,h3,h4{margin:0;font-weight:700;color:var(--navy);}
p{margin:0 0 .6em 0;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--gold-light);}

/* ---------- App shell ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--navy);
  color:#fff;
  box-shadow:var(--shadow);
}
.topbar-inner{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;gap:18px;
  padding:12px 18px;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-weight:800;font-size:1.15rem;white-space:nowrap;
}
.brand .flask{font-size:1.5rem;}
.nav-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:thin;}
.nav-btn{
  border:none;background:transparent;color:#cfe0ee;
  padding:9px 14px;border-radius:999px;font-size:.95rem;font-weight:600;
  white-space:nowrap;transition:.15s;
}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-btn.active{background:var(--gold);color:var(--navy);}
.xp-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);
  border-radius:999px;padding:7px 14px;font-size:.9rem;font-weight:700;
  white-space:nowrap;
}

main{flex:1;max-width:1100px;margin:0 auto;padding:22px 16px 70px;width:100%;}

/* ---------- Home ---------- */
.hero{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  color:#fff;border-radius:var(--radius);
  padding:34px 28px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.hero::after{
  content:"⚗";position:absolute;right:18px;top:-10px;font-size:8rem;opacity:.08;
}
.hero h1{color:#fff;font-size:1.7rem;margin-bottom:8px;}
.hero p{color:#dfe9f3;font-size:1rem;max-width:640px;}
.hero-stats{display:flex;gap:24px;margin-top:18px;flex-wrap:wrap;}
.hero-stat b{display:block;font-size:1.6rem;color:var(--gold-light);}
.hero-stat span{font-size:.85rem;color:#cfe0ee;}

.section-title{
  display:flex;align-items:center;gap:10px;margin:30px 0 14px;
}
.section-title h2{font-size:1.2rem;}
.section-title .line{flex:1;height:1px;background:var(--border);}

.chapter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.chapter-card{
  background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:.18s;text-align:left;
}
.chapter-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--teal);}
.chapter-num{
  display:inline-block;background:var(--navy);color:#fff;font-weight:800;
  border-radius:8px;padding:3px 10px;font-size:.8rem;margin-bottom:10px;
}
.chapter-card h3{font-size:1.1rem;margin-bottom:4px;}
.chapter-card .eng{color:var(--ink-soft);font-size:.9rem;display:block;margin-bottom:10px;}
.progress-bar{height:8px;border-radius:99px;background:var(--border);overflow:hidden;margin-top:10px;}
.progress-bar > div{height:100%;background:var(--teal);border-radius:99px;transition:.3s;}
.progress-label{font-size:.78rem;color:var(--ink-soft);margin-top:5px;}

.placeholder-card{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:20px;color:var(--ink-soft);text-align:center;font-size:.92rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}

.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:8px;}
.quick-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;text-align:left;transition:.15s;
}
.quick-card:hover{border-color:var(--gold);box-shadow:var(--shadow);}
.quick-card .ico{font-size:1.6rem;}
.quick-card h4{margin:8px 0 4px;font-size:1rem;}
.quick-card p{font-size:.85rem;color:var(--ink-soft);margin:0;}

/* ---------- Chapter page ---------- */
.chapter-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;
  margin-bottom:18px;
}
.chapter-header h1{font-size:1.5rem;}
.chapter-header .eng{color:var(--ink-soft);font-size:1rem;}
.chip{
  display:inline-block;background:var(--teal-light);color:var(--teal);
  border-radius:999px;padding:4px 12px;font-size:.8rem;font-weight:700;
}

.topic-card{
  border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;
  overflow:hidden;background:#fff;
}
.topic-head{
  display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;
  user-select:none;
}
.topic-head:hover{background:var(--bg-soft);}
.topic-check{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--border);
  flex:none;display:flex;align-items:center;justify-content:center;font-size:.85rem;
  transition:.15s;
}
.topic-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.topic-head-text{flex:1;min-width:0;}
.topic-head-text h3{font-size:1.05rem;margin-bottom:2px;}
.topic-head-text .eng{font-size:.85rem;color:var(--ink-soft);}
.topic-arrow{font-size:1rem;color:var(--ink-soft);transition:transform .2s;flex:none;}
.topic-card.open .topic-arrow{transform:rotate(180deg);}
.topic-body{display:none;padding:0 18px 20px;border-top:1px solid var(--border);}
.topic-card.open .topic-body{display:block;}
.one-line{
  background:var(--gold-light);border-left:4px solid var(--gold);
  padding:10px 14px;margin:14px 0;border-radius:8px;font-weight:700;font-size:.95rem;
}
.sub-block{margin:16px 0;}
.sub-block h4{
  font-size:.85rem;letter-spacing:.03em;color:var(--teal);text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.sub-block .content{font-size:.97rem;}
.vocab-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.vocab-chip{
  display:flex;align-items:center;gap:6px;background:var(--bg-soft);
  border:1px solid var(--border);border-radius:999px;padding:6px 8px 6px 12px;font-size:.88rem;
}
.vocab-chip .eng{font-weight:700;color:var(--navy);}
.vocab-chip .zh{color:var(--ink-soft);}
.speak-btn{
  border:none;background:var(--teal);color:#fff;width:24px;height:24px;border-radius:50%;
  font-size:.75rem;display:flex;align-items:center;justify-content:center;flex:none;
}
.speak-btn.lg{width:32px;height:32px;font-size:.95rem;}
.speak-btn:active{transform:scale(.9);}
.misconception .content{background:#fdf2f0;border-left:4px solid var(--red);padding:10px 14px;border-radius:8px;}
.examPoint .content{background:#eef6ff;border-left:4px solid var(--navy-light);padding:10px 14px;border-radius:8px;}
.lifeLink .content,.medicalLink .content{background:var(--teal-light);border-left:4px solid var(--teal);padding:10px 14px;border-radius:8px;}

.quiz-block{background:var(--bg-soft);border-radius:var(--radius);padding:14px;margin-top:16px;}
.quiz-q{font-weight:700;margin-bottom:10px;}
.quiz-opt{
  display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:.95rem;transition:.15s;
}
.quiz-opt:hover{border-color:var(--teal);}
.quiz-opt.correct{background:#e7f7ec;border-color:var(--green);}
.quiz-opt.wrong{background:#fdeceb;border-color:var(--red);}
.quiz-explain{font-size:.88rem;color:var(--ink-soft);margin-top:8px;padding:10px;background:#fff;border-radius:8px;display:none;}
.quiz-explain.show{display:block;}

.mark-done-btn{
  margin-top:18px;border:none;background:var(--navy);color:#fff;font-weight:700;
  padding:11px 20px;border-radius:999px;font-size:.92rem;
}
.mark-done-btn.done{background:var(--green);}

/* ---------- Flashcards ---------- */
.fc-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;}
.fc-progress{color:var(--ink-soft);font-size:.9rem;}
.flashcard{
  width:100%;max-width:480px;min-height:230px;border-radius:18px;
  background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px;text-align:center;cursor:pointer;box-shadow:var(--shadow-lg);
  position:relative;
}
.flashcard .face-label{position:absolute;top:14px;left:18px;font-size:.75rem;opacity:.6;letter-spacing:.06em;}
.flashcard .term{font-size:1.7rem;font-weight:800;margin-bottom:10px;}
.flashcard .sub{font-size:1rem;color:#dfe9f3;}
.flashcard .tap-hint{position:absolute;bottom:12px;font-size:.78rem;opacity:.55;}
.fc-controls{display:flex;gap:12px;}
.fc-btn{
  border:none;border-radius:999px;padding:12px 22px;font-weight:700;font-size:.95rem;
}
.fc-btn.know{background:var(--green);color:#fff;}
.fc-btn.dontknow{background:var(--bg-soft);color:var(--ink);border:1px solid var(--border);}
.fc-btn.speak{background:var(--teal);color:#fff;}

/* ---------- Quiz mode (full) ---------- */
.quiz-mode-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);
}
.quiz-meta{display:flex;justify-content:space-between;color:var(--ink-soft);font-size:.85rem;margin-bottom:14px;}
.quiz-result{text-align:center;padding:30px 10px;}
.quiz-result .score{font-size:2.6rem;font-weight:800;color:var(--navy);}

/* ---------- Dashboard ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{
  background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;text-align:center;
}
.stat-card b{display:block;font-size:1.7rem;color:var(--navy);}
.stat-card span{font-size:.82rem;color:var(--ink-soft);}
.badge-grid{display:flex;flex-wrap:wrap;gap:10px;}
.badge{
  display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;
  background:var(--gold-light);color:#7a5c12;font-weight:700;font-size:.85rem;
}
.badge.locked{background:var(--bg-soft);color:var(--ink-soft);opacity:.6;}

footer{
  text-align:center;color:var(--ink-soft);font-size:.82rem;padding:24px;border-top:1px solid var(--border);
}

/* ---------- responsive ---------- */
@media (max-width:640px){
  :root{font-size:16px;}
  .hero{padding:24px 18px;}
  .hero h1{font-size:1.35rem;}
  .brand span.brand-text{display:none;}
  .topic-head{padding:13px 14px;}
  .topic-body{padding:0 14px 16px;}
}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--ink-soft);
}
.empty-state .ico{font-size:2.6rem;margin-bottom:10px;display:block;}

/* ============================================================
   Animation Module (Chapter 8 機構動畫 — OrgChemMap 風格)
   零外部資源，純 SVG + CSS keyframes
   ============================================================ */
.anim-box{
  background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin:10px 0;position:relative;
}
.anim-box svg{width:100%;height:auto;display:block;overflow:visible;}
.anim-box.paused svg .anim-run{animation-play-state:paused !important;}
.anim-toggle{
  position:absolute;top:10px;right:10px;z-index:2;
  border:none;background:var(--navy);color:#fff;border-radius:999px;
  padding:6px 14px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px;
}
.anim-toggle:active{transform:scale(.95);}
.anim-caption{font-size:.82rem;color:var(--ink-soft);text-align:center;margin-top:8px;}
.anim-step-label{font-size:.78rem;fill:var(--ink-soft);}

/* Generic reusable keyframes used across Ch.8 animations */
@keyframes anFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes anPulse{0%,100%{opacity:.55;r:26;}50%{opacity:1;r:30;}}
@keyframes anPulseSmall{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes anDash{to{stroke-dashoffset:-40;}}
@keyframes anFadeIn{0%{opacity:0;}100%{opacity:1;}}
@keyframes anBlink{0%,100%{opacity:.25;}50%{opacity:1;}}

/* 1. Bond-energy curve: ball settles into potential well */
@keyframes anRoll{
  0%{ transform:translate(6px,-46px); }
  55%{ transform:translate(150px,2px); }
  75%{ transform:translate(150px,-10px); }
  100%{ transform:translate(150px,2px); }
}
.an-ball{animation:anRoll 4.5s ease-in-out infinite;}

/* 2. Ionic transfer: electron dot jumps Na -> Cl, lattice fades in */
@keyframes anElecJump{
  0%,8%{ transform:translate(0,0); opacity:1;}
  45%,55%{ transform:translate(96px,-4px); opacity:1;}
  60%,100%{ transform:translate(96px,-4px); opacity:0;}
}
.an-jump-e{animation:anElecJump 3.6s ease-in-out infinite;}
@keyframes anLatticeIn{
  0%,55%{opacity:0; transform:scale(.7);}
  80%,100%{opacity:1; transform:scale(1);}
}
.an-lattice{animation:anLatticeIn 3.6s ease-in-out infinite;}
@keyframes anChargeIn{
  0%,55%{opacity:0;}
  70%,100%{opacity:1;}
}
.an-charge{animation:anChargeIn 3.6s ease-in-out infinite;}

/* 3. Covalent sharing: electron pair orbits shared region */
@keyframes anOrbit{
  0%{ transform:rotate(0deg) translateX(22px) rotate(0deg);}
  100%{ transform:rotate(360deg) translateX(22px) rotate(-360deg);}
}
.an-orbit{animation:anOrbit 3.2s linear infinite; transform-origin:0 0;}
.an-orbit2{animation:anOrbit 3.2s linear infinite reverse; transform-origin:0 0;}

/* 4. Dipole: electron cloud skews toward electronegative atom */
@keyframes anSkew{
  0%,100%{ transform:translateX(0); }
  50%{ transform:translateX(18px); }
}
.an-cloud{animation:anSkew 3s ease-in-out infinite;}
@keyframes anDeltaPulse{0%,100%{opacity:.4;}50%{opacity:1;}}
.an-delta{animation:anDeltaPulse 3s ease-in-out infinite;}

/* 5. Resonance: double bond cycles between positions */
@keyframes anResA{0%,28%{opacity:1;}33%,100%{opacity:0;}}
@keyframes anResB{0%,28%{opacity:0;}33%,61%{opacity:1;}66%,100%{opacity:0;}}
@keyframes anResC{0%,61%{opacity:0;}66%,94%{opacity:1;}100%{opacity:0;}}
.an-res-a{animation:anResA 4.5s linear infinite;}
.an-res-b{animation:anResB 4.5s linear infinite;}
.an-res-c{animation:anResC 4.5s linear infinite;}

/* 6. Octet exception: BF3 resonance forms fade cross */
@keyframes anCrossA{0%,45%{opacity:1;}50%,100%{opacity:0;}}
@keyframes anCrossB{0%,45%{opacity:0;}50%,95%{opacity:1;}100%{opacity:0;}}
.an-cross-a{animation:anCrossA 3.6s linear infinite;}
.an-cross-b{animation:anCrossB 3.6s linear infinite;}

/* 7. Free radical: homolytic cleavage, radicals drift apart, chain arrows */
@keyframes anSplitL{0%,20%{transform:translateX(0);}100%{transform:translateX(-34px);}}
@keyframes anSplitR{0%,20%{transform:translateX(0);}100%{transform:translateX(34px);}}
.an-split-l{animation:anSplitL 3.8s ease-in-out infinite alternate;}
.an-split-r{animation:anSplitR 3.8s ease-in-out infinite alternate;}
@keyframes anDot{0%,100%{opacity:.3;}50%{opacity:1;}}
.an-radical-dot{animation:anDot 1s ease-in-out infinite;}

/* 8. SN1 mechanism: leaving group departs, nucleophile approaches */
@keyframes anLeave{
  0%,15%{ transform:translate(0,0); opacity:1;}
  55%,100%{ transform:translate(46px,-30px); opacity:.15;}
}
.an-leave{animation:anLeave 4.2s ease-in-out infinite;}
@keyframes anApproach{
  0%,40%{ transform:translate(-50px,30px); opacity:0;}
  70%,100%{ transform:translate(0,0); opacity:1;}
}
.an-approach{animation:anApproach 4.2s ease-in-out infinite;}
@keyframes anCationPulse{
  0%,40%{opacity:0;}
  45%,90%{opacity:1;}
  100%{opacity:0;}
}
.an-cation{animation:anCationPulse 4.2s ease-in-out infinite;}

/* 9. Boyle's Law: piston compresses, molecules speed up collisions (not speed) */
@keyframes anPistonDown{
  0%,15%{ transform:translateY(0); }
  50%,85%{ transform:translateY(38px); }
  100%{ transform:translateY(0); }
}
.an-piston{animation:anPistonDown 4.6s ease-in-out infinite;}
@keyframes anGasMoleculeBoyle{
  0%,15%{ transform:translate(0,0); }
  50%,85%{ transform:translate(0,38px) scale(1); }
  100%{ transform:translate(0,0); }
}
.an-gas-mol{animation:anGasMoleculeBoyle 4.6s ease-in-out infinite;}

/* 10. Charles's Law: balloon expands as temperature rises */
@keyframes anBalloonGrow{
  0%,10%{ transform:scale(1); }
  50%,90%{ transform:scale(1.32); }
  100%{ transform:scale(1); }
}
.an-balloon{animation:anBalloonGrow 4.4s ease-in-out infinite; transform-origin:150px 95px;}
@keyframes anHeatGlow{0%,10%{opacity:.15;}50%,90%{opacity:.85;}100%{opacity:.15;}}
.an-heat{animation:anHeatGlow 4.4s ease-in-out infinite;}

/* 11. Dalton's Law: two gas colors mix, partial pressures sum */
@keyframes anDividerFade{0%,15%{opacity:1;}30%,100%{opacity:0;}}
.an-divider{animation:anDividerFade 4.5s ease-in-out infinite;}
@keyframes anMoleculeDrift{
  0%{ transform:translate(0,0); }
  25%{ transform:translate(14px,-8px); }
  50%{ transform:translate(-6px,10px); }
  75%{ transform:translate(10px,6px); }
  100%{ transform:translate(0,0); }
}
.an-drift1{animation:anMoleculeDrift 3.1s ease-in-out infinite;}
.an-drift2{animation:anMoleculeDrift 3.7s ease-in-out infinite reverse;}
.an-drift3{animation:anMoleculeDrift 2.6s ease-in-out infinite;}

/* 12. Kinetic theory: molecule bouncing off container walls */
@keyframes anBounceX{
  0%{ transform:translate(0,0); }
  25%{ transform:translate(210px,0); }
  50%{ transform:translate(210px,110px); }
  75%{ transform:translate(0,110px); }
  100%{ transform:translate(0,0); }
}
.an-bounce{animation:anBounceX 3.4s linear infinite;}
@keyframes anWallFlash{0%,100%{opacity:.2;}8%{opacity:.2;}10%{opacity:1;}18%{opacity:.2;}}
.an-wall-r{animation:anWallFlash 3.4s linear infinite;}
.an-wall-b{animation:anWallFlash 3.4s linear infinite;animation-delay:.85s;}
.an-wall-l{animation:anWallFlash 3.4s linear infinite;animation-delay:1.7s;}
.an-wall-t{animation:anWallFlash 3.4s linear infinite;animation-delay:2.55s;}

/* 13. Effusion: molecules escape one-by-one through pinhole */
@keyframes anEffuseHe{
  0%{ transform:translate(0,0); opacity:0;}
  5%{opacity:1;}
  90%{ transform:translate(150px,-6px); opacity:1;}
  100%{ transform:translate(165px,-8px); opacity:0;}
}
.an-effuse-fast{animation:anEffuseHe 2.2s ease-in infinite;}
@keyframes anEffuseHeavy{
  0%{ transform:translate(0,0); opacity:0;}
  5%{opacity:1;}
  90%{ transform:translate(150px,8px); opacity:1;}
  100%{ transform:translate(165px,10px); opacity:0;}
}
.an-effuse-slow{animation:anEffuseHeavy 4.2s ease-in infinite;}

/* 14. Real gas vs ideal gas: attraction pulls molecule path inward */
@keyframes anAttractPull{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(-10px,6px); }
}
.an-attract{animation:anAttractPull 3s ease-in-out infinite;}
@keyframes anArrowPulse{0%,100%{opacity:.25;}50%{opacity:1;}}
.an-arrow-pulse{animation:anArrowPulse 1.5s ease-in-out infinite;}

/* ===== Chapter 10 (Liquids/IMF & Solids) animation classes ===== */
/* 15. Liquid molecule jiggle (Brownian-like motion within bounds) */
@keyframes anCh10Jiggle{
  0%,100%{ transform:translate(0,0); }
  25%{ transform:translate(3px,-3px); }
  50%{ transform:translate(-2px,2px); }
  75%{ transform:translate(2px,3px); }
}
.an-jiggle{animation:anCh10Jiggle 2.4s ease-in-out infinite;}

/* 16. Hovering dipole/ion satellites around a central ion (hydration shell) */
@keyframes anCh10Hover{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(0,-4px) scale(1.08); }
}
.an-hover1{animation:anCh10Hover 2.6s ease-in-out infinite;}
.an-hover2{animation:anCh10Hover 2.6s ease-in-out infinite .3s;}
.an-hover3{animation:anCh10Hover 2.6s ease-in-out infinite .6s;}
.an-hover4{animation:anCh10Hover 2.6s ease-in-out infinite .9s;}

@keyframes anCh10DashPulse{0%,100%{opacity:.35;}50%{opacity:1;}}
.an-pulse{animation:anCh10DashPulse 1.8s ease-in-out infinite;}

/* 18. Line "drawing itself" — used for curve/graph animations */
@keyframes anCh10Draw{
  0%{ stroke-dasharray:600; stroke-dashoffset:600; }
  100%{ stroke-dasharray:600; stroke-dashoffset:0; }
}
.an-draw{animation:anCh10Draw 2.6s ease-out infinite;}

/* 19. Capillary rise — liquid column animates upward then resets */
@keyframes anCh10Rise{
  0%{ opacity:0; transform:translateY(14px); }
  20%,80%{ opacity:1; transform:translateY(0); }
  100%{ opacity:0; transform:translateY(14px); }
}
.an-rise{animation:anCh10Rise 3.4s ease-in-out infinite;}

/* 20. Evaporation: particles rise from liquid surface into vapor space */
@keyframes anCh10Evap{
  0%{ transform:translate(0,0); opacity:1; }
  80%{ opacity:1; }
  100%{ transform:translate(0,-55px); opacity:0; }
}
.an-evap1{animation:anCh10Evap 3s ease-in infinite;}
.an-evap2{animation:anCh10Evap 3s ease-in infinite .8s;}
.an-evap3{animation:anCh10Evap 3s ease-in infinite 1.6s;}

/* 21. Condensation: particles fall from vapor space back into liquid */
@keyframes anCh10Cond{
  0%{ transform:translate(0,0); opacity:0; }
  20%{ opacity:1; }
  100%{ transform:translate(0,55px); opacity:1; }
}
.an-cond1{animation:anCh10Cond 3s ease-in infinite .4s;}
.an-cond2{animation:anCh10Cond 3s ease-in infinite 1.2s;}

}

      titleEn: "The van't Hoff Equation — How Keq Changes with Temperature",
      oneLine: "van't Hoff方程式 ln(K2/K1) = −(ΔH°/R)(1/T2−1/T1) 讓我們能用已知溫度下的Keq，推算同一反應在另一個溫度下的Keq，前提是假設ΔH°不隨溫度劇烈改變。",
      plain: "前一個主題建立的ΔG°=−RTlnKeq公式有一個重要限制：它只能告訴我們在「某一個特定溫度」下的Keq，但化學家跟工程師常常需要知道：同一個反應，如果溫度從298K換成725K，平衡常數會變成多少？這正是van't Hoff方程式要解決的問題。推導的起點，是把ΔG°=ΔH°−TΔS°代入ΔG°=−RTlnKeq，整理後得到：ln K = −ΔH°/(RT) + ΔS°/R。這個式子的形式非常關鍵——如果我們把ln K當作y軸、1/T當作x軸畫圖，會得到一條直線，斜率是−ΔH°/R，截距是ΔS°/R。這意味著只要實驗量測幾個不同溫度下的Keq、取自然對數後對1/T作圖，就能直接從斜率反推出反應的標準焓變ΔH°，從截距反推出標準熵變ΔS°——這是實驗化學中測定熱力學參數的重要方法之一。如果我們進一步假設ΔH°在所考慮的溫度範圍內大致不變(這是一個常見且通常合理的近似)，可以把ln K = −ΔH°/(RT) + ΔS°/R這個方程式，在兩個不同溫度T1與T2之間做定積分，消去常數項ΔS°/R，得到van't Hoff方程式最終、最常用的形式：ln(K2/K1) = −(ΔH°/R)(1/T2 − 1/T1)。這個方程式中，K1是絕對溫度T1下的平衡常數，K2是絕對溫度T2下的平衡常數，ΔH°是反應的標準焓變，R是氣體常數。只要知道反應的ΔH°，以及某一個溫度下的Keq，就能算出任何其他溫度下的Keq，完全不需要重新做實驗去量測。舉例來說，水煤氣轉換反應CO(g)+H2O(g)⇌CO2(g)+H2(g)在298K時ΔH°298=−41.2 kJ(放熱反應)，若已知298K時的K1，要求725K時的K2，直接代入van't Hoff方程式即可求解；由於反應是放熱的(ΔH°<0)，根據van't Hoff方程式，溫度升高時K會變小——這跟勒沙特列原理(Le Chatelier's principle)對放熱反應「升溫使平衡逆移」的預測完全一致，van't Hoff方程式可以看作是勒沙特列原理的精確定量版本。",

      plain: "「ΔG=0代表平衡」這個準則，除了用在化學反應平衡之外，也完全適用於物理變化的平衡，最直接的例子就是液體與氣體之間的相平衡。當液體在其正常沸點(normal boiling point，即外界壓力為1 atm時)沸騰，液態和氣態其實同時共存、處於動態平衡——分子從液面蒸發進入氣相的速率，恰好等於氣相分子凝結回液態的速率。在這個平衡點，由ΔG=ΔH−TΔS=0(液氣態達到平衡)，我們可以直接解出這個平衡溫度：T = ΔH/ΔS。把這個邏輯套用到氣化過程，沸點 Tb = ΔHvap/ΔSvap，其中ΔHvap是莫耳蒸發熱(heat of vaporization)，ΔSvap是莫耳蒸發熵變。這給了我們一個重要工具：只要知道某物質的ΔHvap和ΔSvap，就能直接算出它的正常沸點，完全不需要實際去做沸點量測實驗。Trouton's rule（特勞頓定律）進一步觀察到一個有趣的經驗規律：許多結構迥異、沸點天差地遠的物質，它們的「莫耳蒸發熵變」ΔS°vap卻驚人地接近一個共同數值，大約87 J/(mol·K)。例如CH3I(g)的ΔS°vap=86.5、C6H6(苯)的ΔS°vap=87.1、C8H18(辛烷)的ΔS°vap=86.2——儘管這三個物質沸點完全不同(因為ΔHvap不同)，蒸發過程中熵增加的幅度卻幾乎一致。這個規律的物理意義是：液體分子在蒸發成氣體時，分子自由度(可及的微觀狀態數)增加的「相對幅度」，對大多數結構簡單、非極性、分子間作用力以倫敦分散力為主的液體而言，其實相當一致——畢竟從「液態被鄰近分子局限住」變成「氣態自由翱翔」，這種自由度躍升的程度，本質上跟分子本身的化學身份關係不大，更多取決於「從凝聚態解放到氣態」這個普遍的物理過程本身。但Trouton's rule有明確的失效範圍：它對於有強烈氫鍵或高度有序液態結構的物質(例如水)就不準確，因為這些液體在液態時，分子間已經透過氫鍵形成相對有序的網絡結構，蒸發時熵增加的幅度會遠超過87這個一般值。",

      plain: "前面九個主題建立的熱力學原理——自發性、熵、自由能、ΔG與平衡的關係——在生物化學中有一個極其重要且優美的應用：解釋蛋白質如何從一條沒有固定形狀的胜肽鏈，自發摺疊(folding)成具有精確三維結構、能執行特定生物功能的天然態(native state)。蛋白質結構的穩定性與催化性質，本質上由其結構折疊之自由能決定。想像一個「摺疊漏斗(folding funnel)」地景圖：縱軸是自由能(free energy)，橫軸代表蛋白質鏈可能採取的所有構形(conformations，包含分子內接觸的數目intramolecular contacts、分子間接觸intermolecular contacts等多個維度)。未摺疊狀態(unfolded)位於漏斗最寬、最高的頂部——此時胜肽鏈有極多種可能的伸展構形(對應極高的構形熵，conformational entropy)，但分子內部缺乏穩定的氫鍵、凡得瓦力等交互作用(焓的貢獻不利)。隨著摺疊過程進行，胜肽鏈逐漸收縮，漏斗逐漸變窄變深，代表可及的構形數目(熵)持續減少，但同時分子內交互作用持續形成、釋放能量(焓持續下降)。天然態(native state)位於漏斗最底部、最深的谷底，這正是整條摺疊路徑上自由能最低的構形——換句話說，蛋白質「選擇」摺疊成天然態，完全符合我們學過的熱力學原理：系統會自發地朝自由能最低(ΔG最負)的方向演化。但這個漏斗地景並不總是平滑無阻的：地景上常常存在局部的能量低谷，稱為摺疊中間態(folding intermediates)，蛋白質可能暫時被困在這些中間態，需要分子伴侶蛋白(chaperones)協助逃脫、繼續往天然態的方向摺疊；如果摺疊路徑走偏，蛋白質鏈可能掉進地景側邊更深的陷阱，形成部分摺疊狀態(partially folded states)、無序聚集體(amorphous aggregates)，甚至是高度有序但具病理性的類澀蛋白纖維(amyloid fibrils)——這正是阿茲海默症、帕金森氏症等神經退化性疾病的分子病理基礎。地景的「崎嶇程度(ruggedness)」決定了摺疊動力學的型態：地景越崎嶇(有很多局部低谷與山丘)，摺疊過程越可能是多指數型(multi-exponential)、經過多個中間態；地景越平滑像個漏斗，摺疊越快、越直接(常被稱為「漏斗型摺疊folding funnel」概念，由Wolynes等學者提出)。這整套自由能地景的框架，把本章學到的所有抽象熱力學概念——自由能、熵、焓、平衡——具象化成一幅可以實際描述生物大分子行為的地圖，是現代結構生物學與藥物設計理解蛋白質行為的核心理論工具。",

          q: "分子伴侶蛋白(chaperone)在蛋白質摺疊過程中的主要功能是什麼？",

<script>
// ============================================================
// Chemistry Learning OS — App Logic
// 純前端、無後端、無需 AI Token；所有內容皆預先建立
// ============================================================
(function(){
  "use strict";

  // ---------- Chapters registry (extensible: 之後上傳新章節PDF時，從這裡加入新的章節物件即可) ----------
  const CHAPTERS = [CH1, CH2, CH3RXN, CH3, CH5, CH6, CH7, CH8, CH9, CH10, CH19];
  // 預留：尚未建立的章節（會隨之後上傳的PDF擴充）
  const UPCOMING_CHAPTERS = [
    "Ch.4 化學計量 Stoichiometry"
  ];

  const STORAGE_KEY = "chem_os_v1";

  // ---------- State ----------
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { doneTopics:{}, xp:0, quizHistory:[], fcKnown:{}, lastVisit:null, streak:0 };
  }
  let state = loadState();

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function addXP(amount){
    state.xp += amount;
    saveState();
    renderXPPill();
  }

  function updateStreak(){
    const today = new Date().toISOString().slice(0,10);
    if(state.lastVisit === today) return;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if(state.lastVisit === yesterday){ state.streak += 1; }
    else if(state.lastVisit !== today){ state.streak = 1; }
    state.lastVisit = today;
    saveState();
  }
  updateStreak();

  // ---------- Helpers ----------
  function allTopics(){
    let arr = [];
    CHAPTERS.forEach(ch => ch.topics.forEach(t => arr.push({chapter:ch, topic:t})));
    return arr;
  }
  function totalTopicsCount(){ return allTopics().length; }
  function doneTopicsCount(){ return Object.keys(state.doneTopics).filter(k=>state.doneTopics[k]).length; }
  function chapterProgress(ch){
    const total = ch.topics.length;
    const done = ch.topics.filter(t => state.doneTopics[t.id]).length;
    return {done, total, pct: total? Math.round(done/total*100):0};
  }
  function allVocab(){
    let arr = [];
    CHAPTERS.forEach(ch => ch.topics.forEach(t => (t.vocab||[]).forEach(v => arr.push(Object.assign({topicId:t.id, topicZh:t.titleZh}, v)))));
    return arr;
  }
  function allQuiz(){
    let arr = [];
    CHAPTERS.forEach(ch => ch.topics.forEach(t => (t.quiz||[]).forEach((q,i) => arr.push(Object.assign({topicId:t.id, topicZh:t.titleZh, qIndex:i}, q)))));
    return arr;
  }
  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- Text-to-speech ----------
  let voicesReady = false;
  let cachedVoice = null;
  function pickVoice(){
    if(!('speechSynthesis' in window)) return null;
    const voices = speechSynthesis.getVoices();
    if(!voices.length) return null;
    return voices.find(v=>/en-US/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang)) || voices[0];
  }
  if('speechSynthesis' in window){
    speechSynthesis.onvoiceschanged = function(){ voicesReady = true; cachedVoice = pickVoice(); };
    cachedVoice = pickVoice();
  }
  function speak(text){
    if(!('speechSynthesis' in window)){
      toast("此瀏覽器不支援語音朗讀（Speech Synthesis）");
      return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.92;
    if(!cachedVoice) cachedVoice = pickVoice();
    if(cachedVoice) u.voice = cachedVoice;
    speechSynthesis.speak(u);
  }
  window.__speak = speak; // exposed for inline onclick

  // ---------- Toast ----------
  let toastTimer = null;
  function toast(msg){
    let el = document.getElementById("toast");
    if(!el){
      el = document.createElement("div");
      el.id = "toast";
      el.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#15314f;color:#fff;padding:10px 18px;border-radius:999px;font-size:.88rem;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .2s;";
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = "1";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ el.style.opacity = "0"; }, 1800);
  }

  // ---------- Router ----------
  let route = {page:"home"};
  function go(page, params){
    route = Object.assign({page}, params||{});
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  }
  window.__go = go;

  // ---------- Rendering ----------
  const mainEl = () => document.getElementById("main-content");

  function renderXPPill(){
    const el = document.getElementById("xp-pill-value");
    if(el) el.textContent = state.xp;
    const lv = document.getElementById("xp-pill-level");
    if(lv) lv.textContent = level();
  }
  function level(){ return Math.max(1, Math.floor(Math.sqrt(state.xp/20)) + 1); }

  function renderTopBar(){
    const navItems = [
      {id:"home", label:"首頁"},
      {id:"ch", label:"章節", param:{cid:CHAPTERS[0].id}},
      {id:"flashcards", label:"單字卡 Anki"},
      {id:"quiz", label:"小測驗"},
      {id:"dashboard", label:"儀表板"}
    ];
    const bar = document.getElementById("topbar-nav");
    bar.innerHTML = navItems.map(n=>{
      const active = (route.page===n.id) || (n.id==="ch" && route.page==="ch");
      return `<button class="nav-btn ${active?'active':''}" data-go="${n.id}" ${n.param?`data-param='${JSON.stringify(n.param)}'`:''}>${n.label}</button>`;
    }).join("");
    bar.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const param = btn.dataset.param ? JSON.parse(btn.dataset.param) : {};
        go(btn.dataset.go, param);
      });
    });
  }

  function renderHome(){
    const done = doneTopicsCount(), total = totalTopicsCount();
    const pct = total ? Math.round(done/total*100) : 0;
    let html = `
      <div class="hero">
        <h1>化學學習操作系統 <span class="eng" style="font-size:1rem;display:block;font-weight:400;margin-top:4px;">Chemistry Learning OS — General Chemistry, Bilingual</span></h1>
        <p>PDF 不是用來讀的，是用來消化的。每一個觀念都拆成中文白話、考點、易錯點、單字（含英文發音）跟小測驗——點開、看懂、考過，再進到下一個。</p>
        <div class="hero-stats">
          <div class="hero-stat"><b>${done} / ${total}</b><span>已完成主題</span></div>
          <div class="hero-stat"><b>${state.xp}</b><span>總經驗值 XP</span></div>
          <div class="hero-stat"><b>${state.streak||0} 🔥</b><span>連續學習天數</span></div>
          <div class="hero-stat"><b>${pct}%</b><span>整體進度</span></div>
        </div>
      </div>

      <div class="section-title"><h2>📚 章節導航 Chapter Navigator</h2><div class="line"></div></div>
      <div class="chapter-grid">
        ${CHAPTERS.map(ch=>{
          const p = chapterProgress(ch);
          return `
          <button class="chapter-card" data-go="ch" data-param='${JSON.stringify({cid:ch.id})}'>
            <span class="chapter-num">Chapter ${ch.num}</span>
            <h3>${esc(ch.titleZh)}</h3>
            <span class="eng">${esc(ch.titleEn)}</span>
            <div class="progress-bar"><div style="width:${p.pct}%"></div></div>
            <div class="progress-label">${p.done} / ${p.total} 主題完成（${p.pct}%）</div>
          </button>`;
        }).join("")}
        <div class="placeholder-card">
          <div style="font-size:1.8rem;">➕</div>
          <div><b>更多章節即將加入</b></div>
          <div style="font-size:.82rem;">下一批 PDF 上傳後會自動擴充：<br>${UPCOMING_CHAPTERS.slice(0,3).map(esc).join("、")}…</div>
        </div>
      </div>

      <div class="section-title"><h2>⚡ 快速功能 Quick Actions</h2><div class="line"></div></div>
      <div class="quick-actions">
        <button class="quick-card" data-go="flashcards">
          <div class="ico">🗂️</div><h4>單字卡 Flashcards</h4>
          <p>雙語詞彙卡，點擊發音鈕聽英文，翻面看中文解釋。</p>
        </button>
        <button class="quick-card" data-go="quiz">
          <div class="ico">📝</div><h4>綜合小測驗</h4>
          <p>跨章節隨機抽題，立即作答、立即看解析。</p>
        </button>
        <button class="quick-card" data-go="dashboard">
          <div class="ico">📊</div><h4>學習儀表板</h4>
          <p>查看 XP、等級、徽章與各章節完成率。</p>
        </button>
      </div>
    `;
    mainEl().innerHTML = html;
    bindGoButtons();
  }

  function bindGoButtons(){
    mainEl().querySelectorAll("[data-go]").forEach(btn=>{
      if(btn.__bound) return;
      btn.__bound = true;
      btn.addEventListener("click", ()=>{
        const param = btn.dataset.param ? JSON.parse(btn.dataset.param) : {};
        go(btn.dataset.go, param);
      });
    });
  }

  function renderChapter(){
    const ch = CHAPTERS.find(c=>c.id===route.cid) || CHAPTERS[0];
    const p = chapterProgress(ch);
    let html = `
      <div class="chapter-header">
        <div>
          <span class="chip">Chapter ${ch.num}</span>
          <h1 style="margin-top:8px;">${esc(ch.titleZh)}</h1>
          <span class="eng">${esc(ch.titleEn)}</span>
        </div>
        <div style="min-width:160px;">
          <div class="progress-bar"><div style="width:${p.pct}%"></div></div>
          <div class="progress-label">${p.done} / ${p.total} 完成（${p.pct}%）</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">
        ${CHAPTERS.map(c=>`<button class="nav-btn" style="background:${c.id===ch.id?'var(--navy)':'var(--bg-soft)'};color:${c.id===ch.id?'#fff':'var(--ink)'};border:1px solid var(--border);" data-go="ch" data-param='${JSON.stringify({cid:c.id})}'>Ch.${c.num} ${esc(c.titleZh)}</button>`).join("")}
      </div>
      <div id="topic-list"></div>
    `;
    mainEl().innerHTML = html;
    bindGoButtons();
    renderTopicList(ch);
  }

  function renderTopicList(ch){
    const list = document.getElementById("topic-list");
    list.innerHTML = ch.topics.map(t => topicCardHTML(t)).join("");
    // bind expand/collapse
    list.querySelectorAll(".topic-head").forEach(head=>{
      head.addEventListener("click", ()=>{
        const card = head.closest(".topic-card");
        card.classList.toggle("open");
      });
    });
    // bind speak buttons
    list.querySelectorAll("[data-speak]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        speak(btn.dataset.speak);
      });
    });
    // bind mark-done
    list.querySelectorAll(".mark-done-btn").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const id = btn.dataset.topicId;
        const wasDone = !!state.doneTopics[id];
        state.doneTopics[id] = !wasDone;
        if(!wasDone){ addXP(15); toast("+15 XP　完成主題！"); }
        saveState();
        renderTopicList(ch);
      });
    });
    // bind quiz options inside topic cards
    bindQuizOptions(list);
    // bind animation play/pause toggles
    bindAnimToggles(list);
  }

  function topicCardHTML(t){
    const done = !!state.doneTopics[t.id];
    const vocabHTML = (t.vocab||[]).map(v=>`
      <span class="vocab-chip">
        <button class="speak-btn" data-speak="${esc(v.en)}" title="播放發音 Play pronunciation">🔊</button>
        <span class="eng">${esc(v.en)}</span><span class="zh">${esc(v.zh)}</span>
      </span>`).join("");

    const blocks = [];
    if(t.plain) blocks.push(subBlock("💬 白話翻譯 Plain Talk", t.plain));
    if(t.highschool) blocks.push(subBlock("🎓 高中版理解 High-School Version", t.highschool));
    if(t.misconception) blocks.push(subBlock("⚠️ 常見迷思 Common Misconception", t.misconception, "misconception"));
    if(t.examPoint) blocks.push(subBlock("🎯 必考重點 Exam Point", t.examPoint, "examPoint"));
    if(t.lifeLink) blocks.push(subBlock("🌍 生活連結 Life Link", t.lifeLink, "lifeLink"));
    if(t.medicalLink) blocks.push(subBlock("🩺 醫學連結 Medical Link", t.medicalLink, "medicalLink"));

    const animHTML = (t.anim||[]).map(a => animBlock(a.id, a.titleZh, a.svg, a.caption)).join("");

    const quizHTML = (t.quiz||[]).map((q,i)=>quizBlockHTML(t.id, i, q)).join("");

    return `
      <div class="topic-card" id="card-${t.id}">
        <div class="topic-head">
          <div class="topic-check ${done?'done':''}">${done?'✓':''}</div>
          <div class="topic-head-text">
            <h3>${esc(t.titleZh)}</h3>
            <span class="eng">${esc(t.titleEn)}</span>
          </div>
          <div class="topic-arrow">▾</div>
        </div>
        <div class="topic-body">
          <div class="one-line">${esc(t.oneLine)}</div>
          ${blocks.join("")}
          ${animHTML}
          ${vocabHTML ? `<div class="sub-block"><h4>🔤 雙語詞彙 Bilingual Vocabulary（點🔊聽發音）</h4><div class="vocab-list">${vocabHTML}</div></div>` : ""}
          ${quizHTML ? `<div class="sub-block"><h4>📝 主動回憶小測驗 Active-Recall Quiz</h4>${quizHTML}</div>` : ""}
          <button class="mark-done-btn ${done?'done':''}" data-topic-id="${t.id}">${done?'✓ 已完成本主題':'標記為已完成（+15 XP）'}</button>
        </div>
      </div>`;
  }

  function subBlock(title, content, extraClass){
    return `<div class="sub-block ${extraClass||''}"><h4>${title}</h4><div class="content">${esc(content)}</div></div>`;
  }

  function animBlock(id, titleZh, svgInner, caption){
    return `
      <div class="sub-block anim-sub">
        <h4>🎬 ${esc(titleZh)}</h4>
        <div class="anim-box" id="animbox-${id}">
          <button class="anim-toggle" data-anim-toggle="${id}">⏸ 暫停</button>
          <svg viewBox="0 0 300 170" xmlns="http://www.w3.org/2000/svg">${svgInner}</svg>
        </div>
        ${caption ? `<div class="anim-caption">${esc(caption)}</div>` : ""}
      </div>`;
  }

  function bindAnimToggles(scope){
    scope.querySelectorAll("[data-anim-toggle]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const id = btn.dataset.animToggle;
        const box = document.getElementById("animbox-"+id);
        if(!box) return;
        const paused = box.classList.toggle("paused");
        btn.textContent = paused ? "▶ 播放" : "⏸ 暫停";
      });
    });
  }

  function quizBlockHTML(topicId, qIndex, q){
    const uid = `${topicId}-q${qIndex}`;
    return `
      <div class="quiz-block" data-quiz-uid="${uid}">
        <div class="quiz-q">Q${qIndex+1}. ${esc(q.q)}</div>
        ${q.options.map((opt,i)=>`<button class="quiz-opt" data-uid="${uid}" data-idx="${i}" data-answer="${q.answer}">${esc(opt)}</button>`).join("")}
        <div class="quiz-explain" id="explain-${uid}">${esc(q.explain||"")}</div>
      </div>`;
  }

  function bindQuizOptions(scope){
    scope.querySelectorAll(".quiz-opt").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const uid = btn.dataset.uid;
        const idx = parseInt(btn.dataset.idx,10);
        const ans = parseInt(btn.dataset.answer,10);
        const block = btn.closest(".quiz-block");
        if(block.dataset.answered) return;
        block.dataset.answered = "1";
        block.querySelectorAll(".quiz-opt").forEach(o=>{
          const oIdx = parseInt(o.dataset.idx,10);
          if(oIdx===ans) o.classList.add("correct");
          else if(oIdx===idx) o.classList.add("wrong");
          o.disabled = true;
        });
        const explainEl = document.getElementById(`explain-${uid}`);
        if(explainEl) explainEl.classList.add("show");
        if(idx===ans){ addXP(8); toast("答對了！+8 XP"); }
        else { toast("再想想看，已標示正確答案"); }
      });
    });
  }

  // ---------- Flashcards ----------
  let fcDeck = [];
  let fcIndex = 0;
  let fcFlipped = false;
  function renderFlashcards(){
    fcDeck = shuffle(allVocab());
    fcIndex = 0; fcFlipped = false;
    mainEl().innerHTML = `
      <div class="section-title"><h2>🗂️ 雙語單字卡 Bilingual Flashcards</h2><div class="line"></div></div>
      <div class="fc-wrap">
        <div class="fc-progress" id="fc-progress"></div>
        <div class="flashcard" id="flashcard"></div>
        <div class="fc-controls">
          <button class="fc-btn speak" id="fc-speak">🔊 發音 Play</button>
          <button class="fc-btn dontknow" id="fc-dontknow">😅 還不熟</button>
          <button class="fc-btn know" id="fc-know">✅ 我認識</button>
        </div>
      </div>
    `;
    document.getElementById("flashcard").addEventListener("click", ()=>{ fcFlipped = !fcFlipped; renderFlashcardFace(); });
    document.getElementById("fc-speak").addEventListener("click", (e)=>{ e.stopPropagation(); if(fcDeck[fcIndex]) speak(fcDeck[fcIndex].en); });
    document.getElementById("fc-know").addEventListener("click", ()=>{
      const v = fcDeck[fcIndex];
      if(v){ state.fcKnown[v.en] = true; addXP(3); }
      saveState(); nextCard();
    });
    document.getElementById("fc-dontknow").addEventListener("click", ()=>{ nextCard(); });
    renderFlashcardFace();
  }
  function nextCard(){
    fcFlipped = false;
    fcIndex++;
    if(fcIndex >= fcDeck.length){
      mainEl().querySelector(".fc-wrap").innerHTML = `
        <div class="empty-state">
          <span class="ico">🎉</span>
          <h3>這組單字卡你都看過一輪了！</h3>
          <p style="margin-top:8px;">已標記「我認識」：${Object.keys(state.fcKnown).length} 個單字</p>
          <button class="mark-done-btn" id="fc-restart" style="margin-top:14px;">重新洗牌再來一輪</button>
        </div>`;
      document.getElementById("fc-restart").addEventListener("click", renderFlashcards);
      return;
    }
    renderFlashcardFace();
  }
  function renderFlashcardFace(){
    const v = fcDeck[fcIndex];
    document.getElementById("fc-progress").textContent = `第 ${fcIndex+1} / ${fcDeck.length} 張`;
    const card = document.getElementById("flashcard");
    if(!v) return;
    if(!fcFlipped){
      card.innerHTML = `<div class="face-label">ENGLISH</div><div class="term eng">${esc(v.en)}</div><div class="tap-hint">點卡片看中文翻譯</div>`;
    }else{
      card.innerHTML = `<div class="face-label">中文 / 出自</div><div class="term">${esc(v.zh)}</div><div class="sub">${esc(v.topicZh)}</div><div class="tap-hint">再點一下翻回英文</div>`;
    }
  }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  // ---------- Quiz mode (full test) ----------
  let quizSet = [];
  let quizIndex = 0;
  let quizScore = 0;
  function renderQuizMode(){
    const pool = shuffle(allQuiz());
    quizSet = pool.slice(0, Math.min(10, pool.length));
    quizIndex = 0; quizScore = 0;
    mainEl().innerHTML = `
      <div class="section-title"><h2>📝 綜合小測驗 Mixed Quiz</h2><div class="line"></div></div>
      <div id="quiz-mode-area"></div>
    `;
    renderQuizQuestion();
  }
  function renderQuizQuestion(){
    const area = document.getElementById("quiz-mode-area");
    if(quizIndex >= quizSet.length){
      const pct = quizSet.length ? Math.round(quizScore/quizSet.length*100) : 0;
      state.quizHistory.push({date:new Date().toISOString(), score:quizScore, total:quizSet.length});
      saveState();
      area.innerHTML = `
        <div class="quiz-mode-card quiz-result">
          <div>測驗完成！</div>
          <div class="score">${quizScore} / ${quizSet.length}</div>
          <div style="color:var(--ink-soft);margin:8px 0 18px;">正確率 ${pct}%</div>
          <button class="mark-done-btn" id="quiz-again">再測一次（重新抽題）</button>
        </div>`;
      document.getElementById("quiz-again").addEventListener("click", renderQuizMode);
      return;
    }
    const q = quizSet[quizIndex];
    area.innerHTML = `
      <div class="quiz-mode-card">
        <div class="quiz-meta"><span>第 ${quizIndex+1} / ${quizSet.length} 題</span><span>來自：${esc(q.topicZh)}</span></div>
        <div class="quiz-q" style="font-size:1.05rem;">${esc(q.q)}</div>
        ${q.options.map((opt,i)=>`<button class="quiz-opt" data-idx="${i}">${esc(opt)}</button>`).join("")}
        <div class="quiz-explain" id="quiz-mode-explain"></div>
      </div>`;
    area.querySelectorAll(".quiz-opt").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        if(area.dataset.answered) return;
        area.dataset.answered = "1";
        const idx = parseInt(btn.dataset.idx,10);
        area.querySelectorAll(".quiz-opt").forEach((o,i)=>{
          if(i===q.answer) o.classList.add("correct");
          else if(i===idx) o.classList.add("wrong");
          o.disabled = true;
        });
        const exp = document.getElementById("quiz-mode-explain");
        exp.textContent = q.explain||"";
        exp.classList.add("show");
        if(idx===q.answer){ quizScore++; addXP(10); }
        setTimeout(()=>{
          quizIndex++;
          area.removeAttribute("data-answered");
          renderQuizQuestion();
        }, 1600);
      });
    });
  }

  // ---------- Dashboard ----------
  function renderDashboard(){
    const total = totalTopicsCount(), done = doneTopicsCount();
    const quizzesTaken = state.quizHistory.length;
    const avgScore = quizzesTaken ? Math.round(state.quizHistory.reduce((s,h)=>s+(h.total?h.score/h.total:0),0)/quizzesTaken*100) : 0;
    const knownVocab = Object.keys(state.fcKnown).length;
    const badges = [
      {label:"初心者：完成第一個主題", unlocked: done>=1},
      {label:"穩定學習：連續 3 天打卡", unlocked: (state.streak||0)>=3},
      {label:"單字王：認識 10 個英文單字", unlocked: knownVocab>=10},
      {label:"測驗高手：完成 3 次小測驗", unlocked: quizzesTaken>=3},
      {label:"章節完成：Chapter 1 全部完成", unlocked: chapterProgress(CHAPTERS[0]).pct===100},
      {label:"全勤學霸：所有主題完成", unlocked: total>0 && done===total}
    ];
    mainEl().innerHTML = `
      <div class="section-title"><h2>📊 學習儀表板 Dashboard</h2><div class="line"></div></div>
      <div class="stat-grid">
        <div class="stat-card"><b>${state.xp}</b><span>總經驗值 XP</span></div>
        <div class="stat-card"><b>Lv.${level()}</b><span>目前等級</span></div>
        <div class="stat-card"><b>${done}/${total}</b><span>完成主題數</span></div>
        <div class="stat-card"><b>${state.streak||0} 🔥</b><span>連續學習天數</span></div>
        <div class="stat-card"><b>${knownVocab}</b><span>已認識單字數</span></div>
        <div class="stat-card"><b>${avgScore}%</b><span>測驗平均正確率（${quizzesTaken}次）</span></div>
      </div>

      <div class="section-title"><h2>📚 各章節完成率</h2><div class="line"></div></div>
      ${CHAPTERS.map(ch=>{
        const p = chapterProgress(ch);
        return `<div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;font-size:.92rem;margin-bottom:4px;">
            <b>Chapter ${ch.num}　${esc(ch.titleZh)}</b><span>${p.done}/${p.total}（${p.pct}%）</span>
          </div>
          <div class="progress-bar"><div style="width:${p.pct}%"></div></div>
        </div>`;
      }).join("")}

      <div class="section-title"><h2>🏅 學習徽章 Badges</h2><div class="line"></div></div>
      <div class="badge-grid">
        ${badges.map(b=>`<div class="badge ${b.unlocked?'':'locked'}">${b.unlocked?'🏅':'🔒'} ${esc(b.label)}</div>`).join("")}
      </div>
    `;
  }

  // ---------- Master render ----------
  function render(){
    renderTopBar();
    switch(route.page){
      case "ch": renderChapter(); break;
      case "flashcards": renderFlashcards(); break;
      case "quiz": renderQuizMode(); break;
      case "dashboard": renderDashboard(); break;
      default: renderHome();
    }
    renderXPPill();
  }

  // expose for inline html (none needed currently, kept for safety)
  window.__appRender = render;

  document.addEventListener("DOMContentLoaded", ()=>{
    render();
  });
})();

</script>
</body>
</html>
